{% extends 'main.html' %}
{% block content %}
<div class="card p-4 mx-auto" style="max-width: 400px;">
    <h3 class="text-center">Вхід 🔐</h3>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success w-100">Увійти</button>
    </form>
    <p class="mt-3 text-center">Немає акаунту? <a href="{% url 'register' %}">Реєстрація</a></p>
</div>
{% endblock content %}
