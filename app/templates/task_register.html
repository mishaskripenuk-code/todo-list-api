{% extends 'main.html' %}
{% block content %}
<div class="card p-4 mx-auto" style="max-width: 400px;">
    <h3 class="text-center">Реєстрація 📝</h3>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">Зареєструватися</button>
    </form>
    <p class="mt-3 text-center">Вже є акаунт? <a href="{% url 'login' %}">Увійти</a></p>
</div>
{% endblock content %}
