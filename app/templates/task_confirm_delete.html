{% extends 'main.html' %}
{% block content %}
<div class="card p-4 border-danger">
    <h3 class="text-danger">Видалити це завдання?</h3>
    <p>"{{ task }}"</p>
    <a href="{% url 'tasks' %}">Скасувати</a>
    <form method="POST" class="mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Так, видалити</button>
    </form>
</div>
{% endblock content %}
